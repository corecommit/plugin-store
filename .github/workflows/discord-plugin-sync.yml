name: Discord Plugin Sync

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Fetch new plugins from Discord
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: "551846012310782014"
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/discord_sync.py

      - name: Commit new plugins and updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/ plugins.json .last_message_id
          git diff --cached --quiet || git commit -m "chore: add plugins from Discord [skip ci]"
          git push